# ESPHome starter config for a Waveshare ESP32-S3-Knob-Touch-LCD-1.8 dial.
#
# STATUS: starting point. The encoder + touch + MQTT plumbing below is concrete
# and matches the hub's protocol (src/hardware/protocol.ts). The round LVGL
# display rendering is left as a TODO — start from the community config linked in
# ../README.md (KrX3D/WaveShare-Knob-Esp32S3), which has a working ST77916 panel
# + custom rotary component for this exact board.
#
# Set the three substitutions, then: esphome run orion-knob.yaml

substitutions:
  dial_id: dial-left # UNIQUE per device: dial-left / dial-right / ...
  base_topic: orion-dials
  # Point this at the hub's MQTT broker (BROKER_MODE=embedded => the hub's IP).
  mqtt_broker: 192.168.1.50

esphome:
  name: orion-${dial_id}

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
  variant: esp32s3

psram:
  mode: octal
  speed: 80MHz

logger:

# Wi-Fi credentials come from a local secrets.yaml (esphome `secret`).
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

mqtt:
  broker: ${mqtt_broker}
  # Last-will marks the dial offline if it drops.
  will_message:
    topic: ${base_topic}/${dial_id}/status
    payload: offline
    retain: true
  on_connect:
    - mqtt.publish:
        topic: ${base_topic}/${dial_id}/status
        payload: online
        retain: true
  # Display updates from the hub. TODO: render these fields on the LCD via LVGL.
  on_message:
    - topic: ${base_topic}/${dial_id}/display
      then:
        - logger.log:
            format: "display update: %s"
            args: ["x.c_str()"]

# --- Rotary encoder (A/B on GPIO8/GPIO7) -------------------------------------
# NOTE: this board's encoder phases are slightly non-standard; if counts are
# doubled or jump, switch to the custom polling component from the KrX3D repo.
sensor:
  - platform: rotary_encoder
    id: knob
    pin_a: GPIO8
    pin_b: GPIO7
    on_clockwise:
      - mqtt.publish:
          topic: ${base_topic}/${dial_id}/event
          payload: '{"type":"rotate","dir":"cw","steps":1}'
    on_anticlockwise:
      - mqtt.publish:
          topic: ${base_topic}/${dial_id}/event
          payload: '{"type":"rotate","dir":"ccw","steps":1}'

# --- Capacitive touch (CST816 on I2C) ----------------------------------------
i2c:
  sda: GPIO11
  scl: GPIO12
  scan: true

touchscreen:
  - platform: cst816
    id: touch
    interrupt_pin: GPIO9
    reset_pin: GPIO10
    on_touch:
      - mqtt.publish:
          topic: ${base_topic}/${dial_id}/event
          payload: '{"type":"tap"}'

# --- Display (TODO) ----------------------------------------------------------
# The panel is a 360x360 round ST77916 over QSPI. Bring it up using the
# community config's `mipi_spi` (model JC3636W518V2) + LVGL, then render the
# label / target / current / power fields received on the display topic above.
